name: 'AI PR Reviewer'
description: 'Self-hosted AI PR review powered by Claude. Bring your own Anthropic API key.'
author: 'AI PR Reviewer Contributors'
branding:
  icon: 'git-pull-request'
  color: 'purple'
inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  github-token:
    description: 'GitHub token used to read PR files and post review comments'
    required: false
    default: ${{ github.token }}
  config-path:
    description: 'Optional path to .ai-reviewer.yml config'
    required: false
    default: '.ai-reviewer.yml'
runs:
  using: 'node20'
  main: 'dist/index.js'
